    <meta charset="UTF-8">

        :root {
            --bg-color: #0b1120;
            --panel-bg: #1e293b;
            --border-glow: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --missing: #f43f5e;
            --gold: #fbbf24;
            --silver: #cbd5e1;
            --bronze: #b45309;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .container { width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }

        .header { text-align: center; padding: 20px; background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); border-radius: 16px; border: 1px dashed var(--warning); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .header-badge { position: absolute; top: 15px; right: 15px; background: rgba(245, 158, 11, 0.2); color: var(--warning); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; border: 1px solid var(--warning); letter-spacing: 1px; }
        .header h1 { margin: 0; font-size: 1.8rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; line-height: 1.3; }
        .header h2 { margin: 5px 0 0 0; font-size: 1rem; color: var(--text-muted); font-weight: 400; }

        .tracker-module { background: var(--panel-bg); border-radius: 16px; padding: 24px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .tracker-stats { display: flex; justify-content: space-between; margin-bottom: 15px; text-align: center; }
        .stat-box { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .stat-value { font-size: 2.2rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; line-height: 1;}
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-top: 8px;}
        .stat-label span { display: block; font-size: 0.65rem; color: #64748b; letter-spacing: 0; margin-top: 2px;}
        
        .val-total { color: var(--text-main); }
        .val-received { color: var(--border-glow); text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .val-missing { color: var(--missing); text-shadow: 0 0 15px rgba(244, 63, 94, 0.4); }
        .val-spoilt { color: var(--warning); text-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        
        .tracker-bar-bg { background: #0f172a; height: 16px; border-radius: 8px; overflow: hidden; margin-top: 5px; border: 1px solid #334155; position: relative; }
        .tracker-bar-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px #38bdf8; position: relative;}

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .panel { background: var(--panel-bg); border-radius: 16px; padding: 24px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        
        .panel-title { font-size: 1.2rem; color: #fff; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 12px; margin-top: 0; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .panel-title span { font-size: 0.85rem; color: var(--text-muted); font-weight: 400; }

        .lb-row { display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .lb-rank { width: 35px; font-weight: 800; color: var(--text-muted); font-size: 1rem; }
        .lb-name { width: 120px; font-weight: 600; font-size: 0.95rem; line-height: 1.2; display: flex; flex-direction: column; }
        .lb-name small { font-size: 0.65rem; color: #64748b; font-family: 'JetBrains Mono', monospace; }
        .lb-bar-bg { flex-grow: 1; background: #0f172a; height: 28px; border-radius: 6px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .lb-bar-fill { height: 100%; background: #475569; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 6px 0 0 6px; }
        .lb-votes { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; font-weight: 800; color: white; font-family: 'JetBrains Mono', monospace; }

        .rank-1 .lb-bar-fill { background: linear-gradient(90deg, #ca8a04, var(--gold)); } .rank-1 .lb-rank { color: var(--gold); }
        .rank-2 .lb-bar-fill { background: linear-gradient(90deg, #64748b, var(--silver)); } .rank-2 .lb-rank { color: var(--silver); }
        .rank-3 .lb-bar-fill { background: linear-gradient(90deg, #78350f, var(--bronze)); } .rank-3 .lb-rank { color: var(--bronze); }
        .winner .lb-bar-fill { background: linear-gradient(90deg, #059669, var(--success)); } .winner .lb-rank { color: var(--success); }

        .history-controls { margin-bottom: 15px; }
        .search-input { width: 100%; background: #0f172a; border: 2px solid #334155; color: #fff; padding: 12px 15px; font-size: 1rem; border-radius: 8px; box-sizing: border-box; transition: all 0.2s; font-family: 'Inter', sans-serif;}
        .search-input:focus { outline: none; border-color: var(--border-glow); }
        .search-input::placeholder { color: #64748b; }

        .history-list { display: grid; grid-template-columns: 1fr; gap: 12px; max-height: 600px; overflow-y: auto; padding-right: 5px; }
        .history-item { background: #0f172a; border: 1px solid #334155; padding: 15px; border-radius: 10px; transition: transform 0.1s; }
        .history-item:hover { border-color: #475569; }
        .spoilt-item { border-color: rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.05); }
        
        .history-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px solid #1e293b; padding-bottom: 10px; }
        .h-voter-info { display: flex; flex-direction: column; gap: 3px; }
        .h-name { font-size: 1rem; font-weight: 800; color: #f8fafc; letter-spacing: 0.5px; }
        .h-id { font-size: 0.85rem; color: var(--border-glow); font-family: 'JetBrains Mono', monospace; font-weight: bold; }
        .h-time { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #64748b; background: #1e293b; padding: 3px 8px; border-radius: 4px; }
        
        .history-vote-badge { display: inline-flex; align-items: center; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); color: #e0f2fe; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; margin: 4px 6px 4px 0; font-family: 'Inter', sans-serif; font-weight: 600; }
        .history-vote-badge span { color: #38bdf8; margin-right: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: normal; }

        @media (min-width: 900px) {
            .results-grid { grid-template-columns: 1fr 1fr; }
            .history-panel { grid-column: span 2; }
            .history-list { grid-template-columns: 1fr 1fr; }
        }
    </style>

    function formatDateTime(timestamp) {
        return new Date(timestamp).toLocaleString('ms-MY', {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    function renderDashboard() {
        const received = submissionHistory.length;
        let spoiltCount = 0;
        let counts = {};
        
        submissionHistory.forEach(record => { 
            if (record.isSpoilt) {
                spoiltCount++;
            } else {
                record.votes.forEach(voteId => { counts[voteId] = (counts[voteId] || 0) + 1; }); 
            }
        });

        const missing = Math.max(0, EXPECTED_BALLOTS - received);
        const percent = Math.min(100, (received / EXPECTED_BALLOTS) * 100);

        document.getElementById('valReceived').innerText = received;
        document.getElementById('valSpoilt').innerText = spoiltCount;
        document.getElementById('valMissing').innerText = missing;
        
        const trackerFill = document.getElementById('trackerFill');
        setTimeout(() => {
            trackerFill.style.width = percent + '%';
            if (received >= EXPECTED_BALLOTS) {
                trackerFill.style.background = 'linear-gradient(90deg, #10b981, #059669)';
                trackerFill.style.boxShadow = '0 0 15px var(--success)';
                document.getElementById('valMissing').style.color = 'var(--text-muted)';
            }
        }, 100);

        let bkArray =[], b10Array =[]; 
        let bkMax = 0, b10Max = 0;

        Object.keys(counts).forEach(id => {
            let obj = { id: id, name: CANDIDATES[id], votes: counts[id] };
            if (parseInt(id) <= 10092) {
                bkArray.push(obj);
                if (counts[id] > bkMax) bkMax = counts[id];
            } else {
                b10Array.push(obj);
                if (counts[id] > b10Max) b10Max = counts[id];
            }
        });

        bkArray.sort((a,b) => b.votes - a.votes); 
        b10Array.sort((a,b) => b.votes - a.votes);

        let htmlBK = '';
        if (bkArray.length === 0) {
            htmlBK = `<div style="text-align:center; color:#475569; padding: 20px;">Menunggu Data...</div>`;
        } else {
            bkArray.forEach((c, index) => {
                let rankClass = '';
                if (index === 0) rankClass = 'rank-1';
                else if (index === 1) rankClass = 'rank-2';
                else if (index === 2) rankClass = 'rank-3';
                else if (index < 8) rankClass = 'winner';
                
                htmlBK += `<div class="lb-row ${rankClass}">
                    <div class="lb-rank">#${index+1}</div>
                    <div class="lb-name">${c.name}<small>${c.id}</small></div>
                    <div class="lb-bar-bg">
                        <div class="lb-bar-fill" style="width: 0%;" data-target="${bkMax > 0 ? (c.votes / bkMax) * 100 : 0}%"></div>
                        <div class="lb-votes">${c.votes}</div>
                    </div>
                </div>`;
            });
        }
        document.getElementById('leaderboardBK').innerHTML = htmlBK;

        let htmlB10 = '';
        if (b10Array.length === 0) {
            htmlB10 = `<div style="text-align:center; color:#475569; padding: 20px;">Menunggu Data...</div>`;
        } else {
            b10Array.forEach((c, index) => {
                let rankClass = index === 0 ? 'rank-1' : '';
                htmlB10 += `<div class="lb-row ${rankClass}">
                    <div class="lb-rank">#${index+1}</div>
                    <div class="lb-name">${c.name}<small>${c.id}</small></div>
                    <div class="lb-bar-bg">
                        <div class="lb-bar-fill" style="width: 0%;" data-target="${b10Max > 0 ? (c.votes / b10Max) * 100 : 0}%"></div>
                        <div class="lb-votes">${c.votes}</div>
                    </div>
                </div>`;
            });
        }
        document.getElementById('leaderboardB10').innerHTML = htmlB10;

        setTimeout(() => {
            document.querySelectorAll('.lb-bar-fill').forEach(bar => {
                bar.style.width = bar.getAttribute('data-target');
            });
        }, 100);

        let histHtml = '';
        submissionHistory.forEach(record => {
            // Render Valid Votes
            let namesStr = record.votes && record.votes.length > 0
                ? record.votes.map(v => `<span class="history-vote-badge"><span>[${v}]</span> ${CANDIDATES[v] || '???'}</span>`).join('')
                : `<span style="font-size: 0.8rem; color: #64748b; font-style: italic;">Tiada Undian Rekod / 无投票记录</span>`;
            
            // Render Invalid Specific Votes (Strikethrough)
            if (record.invalidVotes && record.invalidVotes.length > 0) {
                let invalidStr = record.invalidVotes.map(v => `<span class="history-vote-badge" style="border: 1px dashed var(--danger); background: rgba(239, 68, 68, 0.1); text-decoration: line-through; opacity: 0.8;" title="Undi Salah Zon / Invalid Zone Vote"><span style="color:var(--danger)">[${v}]</span> ${CANDIDATES[v] || '???'}</span>`).join('');
                namesStr += invalidStr;
            }

            let voterIC = record.ic === "0" ? "Tiada IC / Tidak Sah" : record.ic;
            let voterName = record.name || "Tanpa Nama";

            histHtml += `
                <div class="history-item ${record.isSpoilt ? 'spoilt-item' : ''}">
                    <div class="history-header">
                        <div class="h-voter-info">
                            <span class="h-name">${voterName}</span>
                            <span class="h-id">IC: ${voterIC}</span>
                        </div>
                        <span class="h-time">${record.time}</span>
                    </div>
                    <div style="font-size: 0.85rem; line-height: 1.5;">
                        ${record.isSpoilt ? '<span style="background: var(--danger); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 8px; display: inline-block;">❌ UNDI ROSAK / 废票</span><br>' : ''}
                        <div style="${record.isSpoilt ? 'opacity: 0.5; filter: grayscale(1); text-decoration: line-through;' : ''}">${namesStr}</div>
                    </div>
                </div>
            `;
        });
        
        if (submissionHistory.length === 0) {
            histHtml = `<div style="text-align:center; color:#475569; padding: 20px;">Tiada Rekod Audit / 暂无审核记录</div>`;
        }
        document.getElementById('historyLog').innerHTML = histHtml;
    }

    window.filterAudit = function() {
        let term = document.getElementById('auditSearch').value.toLowerCase();
        let items = document.querySelectorAll('.history-item');
        
        items.forEach(item => {
            let text = item.innerText.toLowerCase();
            if (text.includes(term)) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });
    };

    window.onload = renderDashboard;
</script>
